<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212; /* Dark background to focus on the image */
            display: flex;
            justify-content: center; 
            align-items: center;     
            overflow: hidden;        
        }
        .image-container {
            max-width: 95%;          
            max-height: 95%;         
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;     
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6); 
            border-radius: 4px;      
        }
    </style>
</head>
<body>

    <div class="image-container">
        <!-- REPLACE photo.jpg WITH YOUR EXACT IMAGE FILE NAME -->
        <img src="KC.jpg" alt="Shared Image">
    </div>

</body>
</html>
